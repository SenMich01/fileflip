services:
  - type: web
    name: fileflip
    env: static
    buildCommand: npm run build
    startCommand: npx serve -s dist -l 10000
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    port: 10000
