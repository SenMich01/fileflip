What was fixed:
Dependency Version Locking: I have explicitly locked puppeteer-core and chrome-aws-lambda to versions that are known to be compatible with each other (10.1.0). This prevents the ERESOLVE error you encountered.
Clean Installation: By pinning these versions in package.json, Render will now be able to build your application without manual intervention or the --force flag.
OCR Improvements: The previously implemented image preprocessing with sharp remains in ocr.js to ensure high-quality text extraction.
How to fix your repository:
Replace your backend/package.json with the one attached.
Replace your backend/routes/convert.js and backend/routes/ocr.js with the attached versions.
Commit and push these changes to your GitHub repository.
Trigger a new deploy on Render.
The build should now complete successfully, and both Word-to-PDF and Image-to-Text features will be fully operational.
