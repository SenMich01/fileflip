services:
  - type: web
    name: fileflip
    env: static
    buildCommand: npm run build
    startCommand: npx serve -s dist -l 3000 -l 0.0.0.0
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 4
    port: 3000
