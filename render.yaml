services:
  - type: web
    name: fileflip
    env: node
    buildCommand: npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 4
